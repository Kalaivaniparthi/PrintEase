<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Printease — Login</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-bg">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="icon">🖨️</span>
      <div>
        <h1>Printease</h1>
        <p>University Printing Service</p>
      </div>
      <button id="darkToggle" class="dark-toggle" style="margin-left:auto" aria-label="Toggle dark mode">🌙</button>
    </div>

    <!-- Feature highlights -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--gray-100);border:1px solid var(--border)">
        <span>💰</span>
        <div><div style="font-size:13px;font-weight:600">Real-time pricing</div><div class="small muted">Price updates as you choose options.</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--gray-100);border:1px solid var(--border)">
        <span>📄</span>
        <div><div style="font-size:13px;font-weight:600">PDF auto page count</div><div class="small muted">Upload a PDF and pages are detected.</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--gray-100);border:1px solid var(--border)">
        <span>🚚</span>
        <div><div style="font-size:13px;font-weight:600">Home delivery tracking</div><div class="small muted">Staff updates delivery status live.</div></div>
      </div>
    </div>

    <form id="loginForm" class="stack" autocomplete="off" novalidate>
      <div class="field">
        <label for="email"><i class="fa fa-envelope"></i> Email</label>
        <input id="email" type="email" placeholder="name@example.com" required />
      </div>
      <div class="field">
        <label for="password"><i class="fa fa-lock"></i> Password</label>
        <input id="password" type="password" placeholder="••••••••" required />
      </div>

      <p id="loginError" class="error-msg" role="alert"></p>

      <button class="btn btn-primary btn-full" type="submit">
        <i class="fa fa-right-to-bracket"></i> Login
      </button>

      <p class="small muted" style="text-align:center">
        No account? <a href="./signup.html" style="color:var(--blue-light)">Sign up</a>
      </p>
    </form>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
