<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Console - PrintEase</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="brand">
                <div class="brand-icon"><i class="fas fa-print"></i></div>
                <span>Print<strong>Ease</strong></span>
            </a>
            <button class="sidebar-close" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="orders.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>Operations</span></a>
            <a href="profile-admin.html" class="nav-item active"><i class="fas fa-user-shield"></i><span>Owner Console</span></a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <main class="app-main">
        <header class="topbar">
            <button class="topbar-menu" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title">Owner Console</div>
            <div class="topbar-right">
                <div class="topbar-avatar" id="topbarAvatar"></div>
            </div>
        </header>

        <div class="page-content">
            <div id="adminProfileRoot"></div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/profile-admin.js"></script>
</body>
</html>
