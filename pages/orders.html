<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - PrintEase</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="brand">
                <div class="brand-icon"><i class="fas fa-print"></i></div>
                <span>Print<strong>Ease</strong></span>
            </a>
            <button class="sidebar-close" id="sidebarClose" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="upload.html" class="nav-item" data-role-guard="student"><i class="fas fa-upload"></i><span>New Print</span></a>
            <a href="orders.html" class="nav-item active"><i class="fas fa-clipboard-list"></i><span id="ordersNavLabel">My Orders</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Profile</span></a>
            <a href="#" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user" id="sidebarUser"></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <main class="app-main">
        <header class="topbar">
            <button class="topbar-menu" onclick="openSidebar()"><i class="fas fa-bars"></i></button>
            <div class="topbar-title" id="pageTitle">My Orders</div>
            <div class="topbar-right">
                <button class="topbar-icon" id="topOrdersAction" onclick="window.location.href='upload.html'" title="New Order">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="topbar-avatar" id="topbarAvatar"></div>
            </div>
        </header>

        <div class="page-content">
            <div class="filter-bar animate-fade-up">
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-tab active" data-filter="All">All</button>
                    <button class="filter-tab" data-filter="Pending">Pending</button>
                    <button class="filter-tab" data-filter="Printing">Printing</button>
                    <button class="filter-tab" data-filter="Ready">Ready</button>
                    <button class="filter-tab" data-filter="Completed">Completed</button>
                </div>
                <div class="filter-count" id="filterCount"></div>
            </div>

            <div id="ordersList" class="orders-list animate-fade-up" style="animation-delay:0.1s"></div>

            <div class="orders-stats animate-fade-up" style="animation-delay:0.2s">
                <div class="os-item">
                    <i class="fas fa-clipboard-list"></i>
                    <div><h3 id="osTotal">0</h3><p id="osTotalLabel">Total Orders</p></div>
                </div>
                <div class="os-item">
                    <i class="fas fa-rupee-sign"></i>
                    <div><h3 id="osSpent">₹0</h3><p id="osSpentLabel">Total Spent</p></div>
                </div>
                <div class="os-item">
                    <i class="fas fa-copy"></i>
                    <div><h3 id="osPages">0</h3><p id="osPagesLabel">Copies Printed</p></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="../js/app.js"></script>
    <script>
        requireAuth();
        const user = getUser();
        initSidebar(user);

        document.getElementById('ordersNavLabel').textContent = user.role === 'student' ? 'My Orders' : 'Operations';
        document.getElementById('pageTitle').textContent = user.role === 'student' ? 'My Orders' : (user.role === 'staff' ? 'Print Queue' : 'All Orders');

        if (user.role !== 'student') {
            const action = document.getElementById('topOrdersAction');
            action.onclick = () => window.location.href = 'dashboard.html';
            action.innerHTML = '<i class="fas fa-chart-line"></i>';
            action.title = 'Dashboard';
        }

        // Real-time Socket.io — re-render on any order update
        connectSocket((data) => {
            showToast(`Order ${data.orderId} → ${data.status}`, 'info');
            renderOrders();
        });

        let currentFilter = 'All';

        async function renderOrders() {
            let allOrders = [];
            try {
                allOrders = await apiGetOrders();
            } catch (err) {
                showToast('Failed to load orders: ' + err.message, 'error');
            }
            const filtered = currentFilter === 'All' ? allOrders : allOrders.filter(order => order.status === currentFilter);
            const list = document.getElementById('ordersList');

            document.getElementById('filterCount').textContent = `${filtered.length} order${filtered.length !== 1 ? 's' : ''}`;

            if (!filtered.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>${currentFilter === 'All' ? 'No orders yet' : `No ${currentFilter} orders`}</h3>
                        <p>${user.role === 'student' ? 'Your uploaded files will appear here once you place a print request.' : 'Waiting for students to submit work into the queue.'}</p>
                        ${user.role === 'student' && currentFilter === 'All' ? '<a href="upload.html" class="btn-primary-sm"><i class="fas fa-plus"></i> New Order</a>' : ''}
                    </div>`;
            } else {
                list.innerHTML = filtered.map(order => orderCardHTML(order, user.role)).join('');
            }

            updateStats(allOrders);
        }

        function updateStats(allOrders) {
            if (user.role === 'student') {
                document.getElementById('osTotal').textContent = allOrders.length;
                document.getElementById('osSpent').textContent = formatCurrency(allOrders.reduce((sum, o) => sum + (o.amount || 0), 0));
                document.getElementById('osPages').textContent = allOrders.reduce((sum, o) => sum + (o.copies || 0), 0);
            } else if (user.role === 'staff') {
                document.getElementById('osTotal').textContent = allOrders.filter(o => o.status === 'Pending').length;
                document.getElementById('osSpent').textContent = allOrders.filter(o => o.status === 'Printing').length;
                document.getElementById('osPages').textContent = allOrders.filter(o => o.status === 'Ready').length;
                document.getElementById('osTotalLabel').textContent = 'Pending Jobs';
                document.getElementById('osSpentLabel').textContent = 'Printing';
                document.getElementById('osPagesLabel').textContent = 'Ready for Pickup';
            } else {
                document.getElementById('osTotal').textContent = allOrders.length;
                document.getElementById('osSpent').textContent = formatCurrency(allOrders
                    .filter(o => o.payment?.status === 'paid')
                    .reduce((sum, o) => sum + (o.amount || 0), 0));
                document.getElementById('osPages').textContent = allOrders.reduce((sum, o) => sum + (o.copies || 0), 0);
                document.getElementById('osSpentLabel').textContent = 'Revenue';
                document.getElementById('osPagesLabel').textContent = 'Copies Requested';
            }
        }

        document.querySelectorAll('.filter-tab').forEach(button => {
            button.addEventListener('click', function () {
                document.querySelectorAll('.filter-tab').forEach(item => item.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderOrders();
            });
        });

        renderOrders();
        // Fallback poll every 30s
        setInterval(renderOrders, 30000);
    </script>
</body>
</html>
