<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PrintEase</title>
  <script>
    try {
      const s = JSON.parse(sessionStorage.getItem('pe_session'));
      if (s?.role === 'owner')  { location.href = './owner-dashboard.html'; }
      else if (s?.role === 'staff') { location.href = './staff-dashboard.html'; }
      else if (s?.role === 'student') { location.href = './student-dashboard.html'; }
      else { location.href = './login.html'; }
    } catch { location.href = './login.html'; }
  </script>
</head>
<body></body>
</html>
