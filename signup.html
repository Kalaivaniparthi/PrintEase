<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Printease — Sign Up</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="auth-bg">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="icon">🖨️</span>
      <div>
        <h1>Printease</h1>
        <p>Simple, Academic, Efficient</p>
      </div>
      <button id="darkToggle" class="dark-toggle" style="margin-left:auto" aria-label="Toggle dark mode">🌙</button>
    </div>

    <h2 style="font-size:17px;margin-bottom:16px">Create Account</h2>

    <form id="signupForm" class="stack" autocomplete="off" novalidate>
      <div class="field">
        <label for="fullName"><i class="fa fa-user"></i> Full Name</label>
        <input id="fullName" type="text" placeholder="Your full name" required />
      </div>

      <div class="field">
        <label for="email"><i class="fa fa-envelope"></i> Email</label>
        <input id="email" type="email" placeholder="name@example.com" required />
      </div>

      <div class="two-col">
        <div class="field">
          <label for="password"><i class="fa fa-lock"></i> Password</label>
          <input id="password" type="password" placeholder="Min 6 chars" required />
        </div>
        <div class="field">
          <label for="confirmPassword"><i class="fa fa-lock"></i> Confirm</label>
          <input id="confirmPassword" type="password" placeholder="Repeat password" required />
        </div>
      </div>

      <div class="field">
        <label for="role"><i class="fa fa-id-badge"></i> Role</label>
        <select id="role" required>
          <option value="student">Student</option>
          <option value="staff">Staff / Teacher</option>
          <option value="owner">Owner</option>
        </select>
      </div>

      <p id="signupError" class="error-msg" role="alert"></p>

      <button class="btn btn-primary btn-full" type="submit">
        <i class="fa fa-user-plus"></i> Create Account
      </button>

      <p class="small muted" style="text-align:center">
        Already have an account? <a href="./login.html" style="color:var(--blue-light)">Login</a>
      </p>
    </form>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/signup.js"></script>
</body>
</html>
